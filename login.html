<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Celeiros</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            emerald: {
              dark: '#783219',
              DEFAULT: '#783219',
              light: '#783219',
              pale: '#fff8e9',
            },
            beige: {
              dark: '#783219',
              DEFAULT: '#fff8e9',
              light: '#fff8e9',
              cream: '#fff8e9',
            },
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            sans: ['Source Sans 3', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Source Sans 3', system-ui, sans-serif; }
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
  </style>
</head>
<body class="bg-beige-cream text-stone-800 min-h-screen flex">
  <main class="m-auto w-full max-w-md px-4">
    <section class="bg-beige-cream border border-beige-dark/30 rounded-2xl p-6 shadow-sm">
      <h1 class="font-display text-4xl font-semibold text-emerald-dark text-center">Celeiros</h1>
      <p class="text-center text-stone-600 mt-2">Entre com seu nome completo e nº do apartamento.</p>

      <div id="msg" class="mt-4 text-sm text-amber-700 hidden" aria-live="polite"></div>

      <form id="form-login" class="mt-6 space-y-3">
        <input
          id="input-nome"
          type="text"
          placeholder="Nome completo"
          class="w-full px-4 py-3.5 rounded-xl border-2 border-beige-dark/30 bg-beige-cream text-stone-800 placeholder-stone-400 focus:outline-none focus:border-emerald focus:ring-2 focus:ring-emerald/20 transition-all duration-200"
          autocomplete="name"
        />
        <input
          id="input-bloco"
          type="text"
          placeholder="Bloco"
          class="w-full px-4 py-3.5 rounded-xl border-2 border-beige-dark/30 bg-beige-cream text-stone-800 placeholder-stone-400 focus:outline-none focus:border-emerald focus:ring-2 focus:ring-emerald/20 transition-all duration-200"
          autocomplete="off"
        />
        <input
          id="input-ap"
          type="text"
          inputmode="numeric"
          placeholder="Nº do apartamento"
          class="w-full px-4 py-3.5 rounded-xl border-2 border-beige-dark/30 bg-beige-cream text-stone-800 placeholder-stone-400 focus:outline-none focus:border-emerald focus:ring-2 focus:ring-emerald/20 transition-all duration-200"
          autocomplete="off"
          pattern="[0-9]*"
        />

        <label class="flex items-center gap-2 text-sm text-stone-700 select-none">
          <input id="chk-lembrar" type="checkbox" class="h-4 w-4 accent-emerald" />
          Lembrar-me neste dispositivo
        </label>

        <button
          id="btn-entrar"
          type="submit"
          class="w-full btn-tap px-6 py-3.5 rounded-xl bg-emerald text-beige-cream font-semibold shadow-md hover:bg-emerald-dark hover:shadow-lg hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-emerald focus:ring-offset-2 active:bg-emerald-dark active:translate-y-0 transition-all duration-200"
        >
          Entrar
        </button>
      </form>

      <button
        id="btn-voltar"
        type="button"
        class="mt-6 w-full px-4 py-3 rounded-xl border border-beige-dark/40 text-emerald-dark font-semibold hover:bg-beige-cream/70 transition"
      >
        Voltar
      </button>
    </section>
  </main>

  <script>
    function normalizeName(s) {
      return String(s || '').trim().replace(/\s+/g, ' ');
    }

    function showMsg(text) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.classList.remove('hidden');
    }

    async function api(path, opts) {
      opts = opts || {};
      opts.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
      opts.credentials = 'include';
      var res = await fetch(path, opts);
      var data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || ('Erro: ' + res.status));
      return data;
    }

    async function boot() {
      try {
        var me = await api('/api/me', { method: 'GET' });
        if (me && me.authenticated) {
          window.location.href = '/Celeiros/index.html';
          return;
        }
      } catch (e) {
        showMsg(e.message || 'Falha ao iniciar.');
      }
    }

    document.getElementById('btn-voltar').addEventListener('click', function () {
      window.location.href = '/Celeiros/index.html';
    });

    async function entrar(endpoint) {
      var nomeCompleto = normalizeName(document.getElementById('input-nome').value);
      var bloco = normalizeName(document.getElementById('input-bloco').value);
      var apartamento = String(document.getElementById('input-ap').value || '').trim();
      var lembrar = !!document.getElementById('chk-lembrar').checked;
      try {
        await api(endpoint, {
          method: 'POST',
          body: JSON.stringify({ nomeCompleto: nomeCompleto, bloco: bloco, apartamento: apartamento, lembrar: lembrar }),
        });
        window.location.href = '/Celeiros/index.html';
      } catch (e) {
        showMsg(e.message || 'Falha no login.');
      }
    }

    document.getElementById('form-login').addEventListener('submit', function (e) {
      e.preventDefault();
      entrar('/api/auth/login');
    });

    document.getElementById('input-ap').addEventListener('input', function (e) {
      var v = String(e.target.value || '');
      var onlyDigits = v.replace(/\D+/g, '');
      if (onlyDigits !== v) e.target.value = onlyDigits;
    });

    boot();
  </script>
</body>
</html>
